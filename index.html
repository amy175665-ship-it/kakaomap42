<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 맵 API - 카테고리 검색</title>
    <style>
        /* 기본 여백 리셋 */
        *{ padding: 0; margin: 0; box-sizing: border-box; }

        body{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px 18px;
            background:
                radial-gradient(circle at top left, rgba(0, 128, 255, 0.16), transparent 32%),
                linear-gradient(135deg, #f7fbff 0%, #eef4f8 50%, #f8fafc 100%);
            font-family: 'Malgun Gothic', Arial, sans-serif;
        }
        
        /* 검색창 및 버튼 레이아웃 */
        .search-container {
            position: relative;
            z-index: 10; 
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: min(90vw, 420px);
            margin-top: 16px;
            order: 2;
        }

        .search-box {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.94);
            padding: 10px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
        }
        .search-box input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #d6e0ea;
            border-radius: 8px;
            outline: none;
            color: #1f2937;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .search-box input:focus {
            border-color: #0080ff;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 128, 255, 0.16);
        }
        .search-box button {
            flex: 0 0 auto;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(135deg, #0080ff, #0066d6);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0, 102, 214, 0.26);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-box button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(0, 102, 214, 0.32);
        }

        /* 새로 추가된 카테고리 버튼 스타일 */
        .category-box {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .category-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 20px;
            background: white;
            color: #4b5563;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            transition: all 0.2s;
        }
        .category-btn:hover {
            background: #f1f5f9;
            color: #0080ff;
            border-color: #0080ff;
        }

        /* 지도 크기 (화면 전체) */
        #map {
            width: min(92vw, 760px);
            height: min(72vh, 560px);
            min-height: 430px;
            order: 1;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 22px 55px rgba(15, 23, 42, 0.18),
                0 2px 8px rgba(15, 23, 42, 0.08);
        }

        @media (max-width: 560px) {
            body {
                padding: 18px 12px;
                align-items: flex-start;
                justify-content: flex-start;
            }
            .search-container {
                width: calc(100vw - 32px);
                margin: 12px auto 0;
            }
            #map {
                width: 100%;
                height: calc(100vh - 36px);
                min-height: 520px;
                border-radius: 14px;
            }
        }

        .wrap {
            position: absolute;
            left: 0; bottom: 20px; 
            width: 360px; 
            height: 142px; 
            margin-left: -180px; 
            text-align: left;
            font-size: 13px;
            font-family: 'Malgun Gothic', dotum, '돋움', sans-serif;
            line-height: 1.6;
        }
        .wrap .info {
            width: 100%;
            height: 130px; 
            border-radius: 8px;
            background: #fff;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
        }
        .info .title {
            padding: 8px 0 0 15px; 
            height: 38px; 
            background: #0080ff; 
            color: #ffffff; 
            font-size: 15px;
            font-weight: bold;
            position: relative;
        }
        .info .close {
            position: absolute;
            top: 11px;
            right: 15px;
            width: 16px;
            height: 16px;
            background: url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/overlay_close.png');
            filter: brightness(0) invert(1); 
        }
        .info .close:hover { cursor: pointer; opacity: 0.8; }
        .info .body { position: relative; padding: 10px 12px; }
        .info .desc { margin-left: 85px; height: 72px; display: flex; flex-direction: column; }
        .desc .ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .desc .jibun { font-size: 11px; color: #7f8c8d; }
        .info .img {
            position: absolute;
            top: 10px; left: 12px; width: 73px; height: 70px;
            border: 1px solid #eee; border-radius: 4px; overflow: hidden;
        }
        .wrap:after {
            content: ''; position: absolute; margin-left: -11px; left: 50%; bottom: 0; 
            width: 22px; height: 12px; background: url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/vertex_white.png');
        }
        .info .link { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    
    <div class="search-container">
        <!-- 상단 검색창 -->
        <div class="search-box">
            <input type="text" id="myInput" value="한대앞역 카페" onkeyup="if(window.event.keyCode==13){startSearch()}">
            <button onclick="startSearch()">검색</button>
        </div>
        <!-- 하단 맛집, 카페, 편의점 버튼 추가 -->
        <div class="category-box">
            <button class="category-btn" onclick="searchCategory('맛집')">맛집</button>
            <button class="category-btn" onclick="searchCategory('카페')">카페</button>
            <button class="category-btn" onclick="searchCategory('편의점')">편의점</button>
        </div>
    </div>

    <div id="map"></div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=42f94fd5b3b8d883d21c91ad85139dd2&libraries=services"></script>
    <script>
                // ----------------------------------------------------
                // [기본 설정] 지도 띄우기
                // ----------------------------------------------------
                let container = document.getElementById('map');
                let options = {
                    center: new kakao.maps.LatLng(37.3097, 126.8536), // 한대앞역 좌표
                    level: 3
                };
                let map = new kakao.maps.Map(container, options);

                var infowindow = new kakao.maps.InfoWindow({ zIndex:1 });
                var saveMarkers = [];

                // ----------------------------------------------------
                // 1. 내가 직접 만든 고정 마커와 오버레이 (한대앞역 오리지널)
                // ----------------------------------------------------
                let myPosition = new kakao.maps.LatLng(37.3097, 126.8536); 
                let myMarker = new kakao.maps.Marker({
                    position: myPosition,
                    map: map 
                });

                var myHtml = '<div class="wrap">' + 
                    '    <div class="info">' + 
                    '        <div class="title">' + 
                    '            한대앞역' + 
                    '            <div class="close" onclick="closeMyOverlay()" title="닫기"></div>' + 
                    '        </div>' + 
                    '        <div class="body">' + 
                    '            <div class="img">' +
                    '                <img src="./img/han.jpg" style="width:73px; height:70px; object-fit:cover;">' +
                    '           </div>' + 
                    '            <div class="desc">' + 
                    '                <div class="ellipsis">경기도 안산시 상록구 광덕산로 365</div>' + 
                    '                <div class="jibun ellipsis">(우) 15501 (지번) 이동 715-1</div>' + 
                    '                <div><a href="http://www.seoulmetro.co.kr/kr/index.do?device=PC" target="_blank" class="link">홈페이지</a></div>' + 
                    '            </div>' + 
                    '        </div>' + 
                    '    </div>' +    
                    '</div>';

                var myOverlay = new kakao.maps.CustomOverlay({
                    content: myHtml,
                    map: map, 
                    position: myMarker.getPosition()       
                });

                kakao.maps.event.addListener(myMarker, 'click', function() {
                    myOverlay.setMap(map);
                });

                function closeMyOverlay() {
                    myOverlay.setMap(null);     
                }

                // ----------------------------------------------------
                // 2. 키워드 장소 검색 및 카테고리 검색 기능
                // ----------------------------------------------------
                var ps = new kakao.maps.services.Places(); 

                startSearch();

                // 일반 검색창 입력 검색
                function startSearch() {
                    var textValue = document.getElementById('myInput').value;
                    
                    if (textValue.trim() === '') {
                        alert('검색어를 입력해주세요!');
                        return;
                    }
                    clearPrevMarkers();
                    ps.keywordSearch(textValue, searchCallback); 
                }

                /* [핵심 추가] 버튼 클릭 시 현재 지도 중심 기준으로 근처 장소 찾기 */
                function searchCategory(categoryKeyword) { // categoryKeyword = "맛집" 이 들어옴
                    // 입력창 글자도 클릭한 카테고리로 변경해 주는 센스
                    document.getElementById('myInput').value = categoryKeyword; // ① 입력창 글자 바꾸기

                    clearPrevMarkers(); // ② 옛날에 검색해서 찍혀있던 마커들 싹 청소하기

                    // 현재 화면의 중심 좌표를 구합니다. (지도를 움직였다면 움직인 중심 기준)
                    var currentCenter = map.getCenter();

                    // 카카오 맵 검색 옵션 설정 (내 근처 2km 반경 제한)
                    var searchOptions = {
                        location: currentCenter, // 아까 구한 지도 중심 기준으로!
                        radius: 2000, // 2km 이내
                        sort: kakao.maps.services.SortBy.DISTANCE // 가까운 순서대로 정렬해 줘!
                    };

                    // 중심좌표 기준으로 키워드 검색 요청
                    // ⑤ 카카오 컴퓨터야, 이 조건으로 진짜 검색해 줘!
                    ps.keywordSearch(categoryKeyword, searchCallback, searchOptions);
                }

                // 기존 마커 및 인포윈도우 지우는 함수 공통화
                function clearPrevMarkers() {
                    for (var i = 0; i < saveMarkers.length; i++) {
                        saveMarkers[i].setMap(null);
                    }
                    saveMarkers = []; 
                    infowindow.close();
                }

                function searchCallback(data, status, pagination) {
                    if (status === kakao.maps.services.Status.OK) { // ① 결과가 성공(OK)일 때만!
                        var bounds = new kakao.maps.LatLngBounds(); // ② 마커들을 다 담을 큰 상자(범위) 준비

                        for (var i = 0; i < data.length; i++) { // ③ 검색된 개수만큼 반복문 돌리기
                            drawNewMarker(data[i]); // 마커 찍는 함수 실행
                            bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x)); // 상자에 좌표 추가
                        }       
                        map.setBounds(bounds); // ④ 상자 크기에 맞게 지도 화면을 자동으로 맞추기!
                    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                        alert('근처에 검색 결과가 없습니다.');
                    }
                }

                function drawNewMarker(place) {
                    var newMarker = new kakao.maps.Marker({
                        map: map,
                        position: new kakao.maps.LatLng(place.y, place.x) 
                    });

                    saveMarkers.push(newMarker);

                    kakao.maps.event.addListener(newMarker, 'click', function() {
                        infowindow.setContent('<div style="padding:5px; font-size:12px; color:black; font-weight:bold;">' + place.place_name + '</div>');
                        infowindow.open(map, newMarker);
                    });
                }
    </script>
</body>
</html>
